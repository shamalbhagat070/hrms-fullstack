<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Payroll - HRMS</title>
    <link rel="stylesheet" href="../../css/admin.css">
</head>

<body>

    <div class="container">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <h2>HRMS Admin</h2>
            <ul>
                <li><a href="dashboard.html">🏠 Dashboard</a></li>
                <li><a href="employees.html">👨‍💼 Employees</a></li>
                <li><a href="attendance.html">📊 Attendance</a></li>
                <li><a href="leaves.html">🌴 Leaves</a></li>
                <li class="active"><a href="payroll.html">💰 Payroll</a></li>
                <li><a href="tasks.html">📋 Tasks <a></li>
            </ul>
        </aside>

        <!-- MAIN -->
        <main class="main">

            <!-- HEADER -->
            <header class="header">
                <div>
                    <h1>Payroll Management</h1>
                    <p class="sub-text">Auto salary generation with leave deduction</p>
                </div>

                <button class="btn-primary" onclick="openPayrollModal()">
                 Generate Payroll
            </button>
            </header>

            <!-- CONTROLS -->
            <section class="controls">

                <!-- 🔍 SEARCH TABLE -->
                <input type="text" id="searchPayroll" placeholder="🔍 Search employee..." onkeyup="loadPayroll()">

                <!-- 📅 MONTH FILTER -->
                <select id="filterMonth" onchange="loadPayroll()">
                <option value="1">January</option>
                <option value="2">February</option>
                <option value="3">March</option>
                <option value="4" selected>April</option>
                <option value="5">May</option>
                <option value="6">June</option>
                <option value="7">July</option>
                <option value="8">August</option>
                <option value="9">September</option>
                <option value="10">October</option>
                <option value="11">November</option>
                <option value="12">December</option>
            </select>

            </section>

            <!-- TABLE -->
            <section class="content">
                <table class="table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Employee</th>
                            <th>Month</th>
                            <th>Basic</th>
                            <th>Allowances</th>
                            <th>Deductions</th>
                            <th>Net Salary</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>

                    <tbody id="payrollTable"></tbody>
                </table>
            </section>

        </main>

    </div>

    <!-- ================= MODAL ================= -->
    <div class="modal" id="payrollModal">
        <div class="modal-content">

            <h2>Generate Payroll</h2>

            <label>Select Month</label>
            <select id="month">
            <option value="1">January</option>
            <option value="2">February</option>
            <option value="3">March</option>
            <option value="4">April</option>
            <option value="5">May</option>
            <option value="6">June</option>
            <option value="7">July</option>
            <option value="8">August</option>
            <option value="9">September</option>
            <option value="10">October</option>
            <option value="11">November</option>
            <option value="12">December</option>
        </select>

            <!-- 🔍 SEARCH FOR GENERATION -->
            <label>Search Employee (optional)</label>
            <input type="text" id="searchEmployee" placeholder="Enter name (e.g. Shamal)">

            <div class="modal-actions">
                <button class="btn-primary" onclick="generatePayroll()">Generate</button>
                <button class="btn-secondary" onclick="closePayrollModal()">Cancel</button>
            </div>

        </div>
    </div>

    <script src="../../js/admin/payroll.js"></script>

</body>

</html>
