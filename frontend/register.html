<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>HRMS Register</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body class="login-body register-body">

    <div class="login-container">

        <div class="login-box">

            <h2>HRMS Registration</h2>

            <div id="errorMessage" class="error-box"></div>

            <form id="registerForm">

                <div class="form-grid">

                    <!-- ROW 1 -->
                    <div>
                        <label>First Name</label>
                        <input type="text" id="firstName" required>
                    </div>

                    <div>
                        <label>Last Name</label>
                        <input type="text" id="lastName" required>
                    </div>

                    <!-- ROW 2 -->
                    <div>
                        <label>Email</label>
                        <input type="email" id="email" required>
                    </div>

                    <div>
                        <label>Mobile Number</label>
                        <input type="text" id="mobileNumber" maxlength="10" required>
                    </div>

                    <!-- ROW 3 -->
                    <div class="full-width">
                        <label>Address</label>
                        <input type="text" id="address" required>
                    </div>

                    <!-- ROW 4 -->
                    <div>
                        <label>Department</label>
                        <input type="text" id="department" required>
                    </div>

                    <div>
                        <label>Designation</label>
                        <input type="text" id="designation" required>
                    </div>

                    <div>
                        <label>Salary</label>
                        <input type="text" id="salary" required>
                    </div>


                    <!-- ROW 5 -->
                    <div>
                        <label>Username</label>
                        <input type="text" id="username" required>
                    </div>

                    <div>
                        <label>Role</label>


                        <select id="role" required>
  <option value="" disabled selected>Select Role</option>
  <option value="EMPLOYEE">Employee</option>
  <option value="INTERN">Intern</option>
  <option value="ADMIN">Admin</option>
</select>

                    </div>

                    <!-- ROW 6 -->
                    <div>
                        <label>Password</label>
                        <input type="password" id="password" required>
                    </div>

                    <div>
                        <label>Confirm Password</label>
                        <input type="password" id="confirmPassword" required>
                    </div>

                    <!-- BUTTON -->
                    <div class="full-width">
                        <button id="registerBtn" type="submit">Register</button>
                    </div>

                </div>

                <div class="extra-links">
                    <p>Already have an account?
                        <a href="login.html">Login</a>
                    </p>
                </div>

            </form>

        </div>

    </div>

    <script src="js/auth.register.js"></script>

</body>

</html>
